<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esports Roster Maker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

body{
  background:#0b0b0b;
  color:white;
  padding:12px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-bottom:14px;
}

input,button{
  padding:10px;
  border:0;
  border-radius:7px;
}

button{
  background:linear-gradient(45deg,#ff2a00,#ff8a00);
  color:white;
  font-weight:bold;
}

#poster{
  width:100%;
  max-width:1000px;
  aspect-ratio:16/9;
  margin:auto;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at center,#ff3b00 0%,#b51608 35%,#260000 100%);
}

/* esports shape background */
#poster::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg,transparent 10%,rgba(255,255,255,.08) 10%,transparent 30%),
    linear-gradient(45deg,transparent 15%,rgba(255,255,255,.06) 15%,transparent 40%);
  z-index:1;
}

/* dark fade like example */
#poster::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top,#050000 0%,rgba(0,0,0,.85) 12%,transparent 48%),
    linear-gradient(to right,rgba(0,0,0,.65),transparent 35%,transparent 65%,rgba(0,0,0,.65));
  z-index:4;
}

#teamName{
  position:absolute;
  top:22px;
  width:100%;
  text-align:center;
  z-index:8;
  font-size:44px;
  letter-spacing:4px;
  color:#ffd46b;
  text-shadow:0 0 18px #000;
}

.players{
  position:absolute;
  bottom:-8px;
  left:50%;
  transform:translateX(-50%);
  width:108%;
  height:98%;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  z-index:5;
}

.playerBox{
  width:24%;
  height:88%;
  margin-left:-3.6%;
  position:relative;
  overflow:visible;
}

.playerBox:first-child{margin-left:0}

.playerBox img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top center;
  filter:
    drop-shadow(0 0 20px #000)
    drop-shadow(0 10px 25px #000);
}

/* proper roster depth */
.playerBox:nth-child(1){
  height:84%;
  z-index:2;
  transform:translateX(25px);
}

.playerBox:nth-child(2){
  height:95%;
  z-index:4;
  transform:translateX(10px);
}

.playerBox:nth-child(3){
  height:98%;
  z-index:5;
  transform:translateX(-10px);
}

.playerBox:nth-child(4){
  height:86%;
  z-index:3;
  transform:translateX(-25px);
}

/* bottom shadow on players */
.playerBox::after{
  content:"";
  position:absolute;
  left:-10%;
  right:-10%;
  bottom:0;
  height:38%;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
  z-index:10;
  pointer-events:none;
}

.emptyText{
  position:absolute;
  top:45%;
  width:100%;
  text-align:center;
  z-index:10;
  color:#ffffff80;
  font-size:24px;
}

@media(max-width:600px){
  body{padding:6px}
  .controls input,.controls button{width:100%;font-size:13px}
  #teamName{font-size:22px;letter-spacing:2px}
  .emptyText{font-size:14px}
}
</style>
</head>

<body>

<div class="controls">
  <input type="file" id="bgUpload" accept="image/*">
  <input type="text" id="nameInput" placeholder="Team name optional">

  <input type="file" class="playerUpload" accept="image/*">
  <input type="file" class="playerUpload" accept="image/*">
  <input type="file" class="playerUpload" accept="image/*">
  <input type="file" class="playerUpload" accept="image/*">

  <button onclick="downloadPoster()">Download Roster</button>
</div>

<div id="poster">
  <h1 id="teamName"></h1>

  <div class="emptyText" id="emptyText">
    Upload 4 Player Photos
  </div>

  <div class="players">
    <div class="playerBox"><img></div>
    <div class="playerBox"><img></div>
    <div class="playerBox"><img></div>
    <div class="playerBox"><img></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const poster=document.getElementById("poster");
const bgUpload=document.getElementById("bgUpload");
const nameInput=document.getElementById("nameInput");
const teamName=document.getElementById("teamName");
const uploads=document.querySelectorAll(".playerUpload");
const players=document.querySelectorAll(".playerBox img");
const emptyText=document.getElementById("emptyText");

let uploadedCount=0;

bgUpload.addEventListener("change",function(){
  const file=this.files[0];
  if(!file)return;

  const url=URL.createObjectURL(file);
  poster.style.backgroundImage=
  `linear-gradient(rgba(0,0,0,.1),rgba(0,0,0,.1)),url(${url})`;
  poster.style.backgroundSize="cover";
  poster.style.backgroundPosition="center";
});

nameInput.addEventListener("input",function(){
  teamName.innerText=this.value;
});

uploads.forEach((input,index)=>{
  input.addEventListener("change",function(){
    const file=this.files[0];
    if(!file)return;

    players[index].src=URL.createObjectURL(file);
    uploadedCount++;

    if(uploadedCount>0){
      emptyText.style.display="none";
    }
  });
});

function downloadPoster(){
  html2canvas(poster,{
    scale:3,
    useCORS:true,
    backgroundColor:null
  }).then(canvas=>{
    canvas.toBlob(blob=>{
      const file=new File([blob],"esports-roster.png",{type:"image/png"});

      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({
          files:[file],
          title:"Esports Roster"
        });
      }else{
        const link=document.createElement("a");
        link.download="esports-roster.png";
        link.href=URL.createObjectURL(blob);
        link.click();
      }
    });
  });
}
</script>

</body>
</html>
