<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster Maker</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#111;color:white;font-family:Arial;padding:12px}
.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}
input,button{padding:10px;border-radius:6px;border:0}
button{background:#ff3c00;color:white;font-weight:bold}

#poster{
  width:100%;
  max-width:1000px;
  aspect-ratio:16/9;
  margin:auto;
  position:relative;
  overflow:hidden;
  background:radial-gradient(circle,#ff3b00,#4b0505 75%);
}

#poster:before{
  content:"";
  position:absolute;
  inset:0;
  background:
  linear-gradient(to top,rgba(0,0,0,.9),transparent 45%),
  linear-gradient(to right,rgba(0,0,0,.65),transparent,rgba(0,0,0,.65));
  z-index:2;
}

#teamName{
  position:absolute;
  top:25px;
  width:100%;
  text-align:center;
  font-size:46px;
  color:#ffd36a;
  z-index:5;
  text-shadow:0 0 15px #000;
}

.players{
  position:absolute;
  bottom:-5px;
  left:50%;
  transform:translateX(-50%);
  width:105%;
  height:96%;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  z-index:3;
}

.playerBox{
  width:24%;
  height:92%;
  margin-left:-3%;
  position:relative;
  overflow:hidden;
}

.playerBox:first-child{margin-left:0}

.playerBox img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:top center;
  filter:drop-shadow(0 0 18px #000);
}

.playerBox:nth-child(1),
.playerBox:nth-child(4){
  height:84%;
  z-index:2;
}

.playerBox:nth-child(2),
.playerBox:nth-child(3){
  height:96%;
  z-index:4;
}

.playerBox:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.65),transparent 35%);
}

@media(max-width:600px){
  #teamName{font-size:24px}
}
</style>
</head>

<body>

<div class="controls">
  <input type="file" id="bgUpload" accept="image/*">
  <input type="text" id="nameInput" placeholder="Team name optional">

  <input type="file" class="playerUpload" accept="image/*">
  <input type="file" class="playerUpload" accept="image/*">
  <input type="file" class="playerUpload" accept="image/*">
  <input type="file" class="playerUpload" accept="image/*">

  <button onclick="downloadPoster()">Download</button>
</div>

<div id="poster">
  <h1 id="teamName"></h1>

  <div class="players">
    <div class="playerBox"><img></div>
    <div class="playerBox"><img></div>
    <div class="playerBox"><img></div>
    <div class="playerBox"><img></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const poster = document.getElementById("poster");
const bgUpload = document.getElementById("bgUpload");
const nameInput = document.getElementById("nameInput");
const teamName = document.getElementById("teamName");
const uploads = document.querySelectorAll(".playerUpload");
const players = document.querySelectorAll(".playerBox img");

bgUpload.addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const url = URL.createObjectURL(file);
  poster.style.backgroundImage =
  `linear-gradient(rgba(0,0,0,.15),rgba(0,0,0,.15)),url(${url})`;
  poster.style.backgroundSize = "cover";
  poster.style.backgroundPosition = "center";
});

nameInput.addEventListener("input", function(){
  teamName.innerText = this.value;
});

uploads.forEach((input,index)=>{
  input.addEventListener("change",function(){
    const file = this.files[0];
    if(!file) return;

    players[index].src = URL.createObjectURL(file);
  });
});

function downloadPoster(){
  html2canvas(poster,{
    scale:3,
    useCORS:true,
    backgroundColor:null
  }).then(canvas=>{
    canvas.toBlob(function(blob){
      const file = new File([blob], "roster-poster.png", {type:"image/png"});

      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({
          files:[file],
          title:"Roster Poster"
        });
      }else{
        const link = document.createElement("a");
        link.download = "roster-poster.png";
        link.href = URL.createObjectURL(blob);
        link.click();
      }
    });
  });
}
</script>

</body>
</html>
